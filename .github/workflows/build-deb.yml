name: Build DEB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build .deb package
        env:
          DEB_VERSION: 1.0.${{ github.run_number }}
        run: |
          ./packaging/build-deb.sh
          ls -lah dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapret-for-ubuntu-deb
          path: |
            dist/*.deb
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish/replace rolling release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deb-latest
          name: deb-latest
          prerelease: true
          make_latest: false
          files: |
            dist/*.deb
            dist/*.sha256
          body: |
            Автоматическая сборка .deb из последнего push в `master`.
            Файл заменяется на каждом новом запуске workflow.
          fail_on_unmatched_files: true
          generate_release_notes: false
          overwrite_files: true
