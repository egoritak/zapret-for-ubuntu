name: Build DEB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build .deb package
        env:
          DEB_VERSION: 1.0.${{ github.run_number }}
        run: |
          ./packaging/build-deb.sh
          ls -lah dist

      - name: Upload artifact
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapret-for-ubuntu-deb
          path: |
            dist/*.deb
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Keep only latest artifact
        uses: actions/github-script@v7
        env:
          CURRENT_ARTIFACT_ID: ${{ steps.upload_artifact.outputs.artifact-id }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const currentId = Number(process.env.CURRENT_ARTIFACT_ID || "0");
            const targetName = "zapret-for-ubuntu-deb";

            let page = 1;
            while (true) {
              const resp = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page
              });
              const artifacts = resp.data.artifacts || [];
              if (artifacts.length === 0) break;

              for (const artifact of artifacts) {
                if (artifact.name !== targetName) continue;
                if (artifact.id === currentId) continue;
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id
                });
                core.info(`Deleted old artifact ${artifact.id} (${artifact.name})`);
              }

              if (artifacts.length < 100) break;
              page += 1;
            }

      - name: Publish/replace rolling release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deb-latest
          name: deb-latest
          prerelease: true
          make_latest: false
          files: |
            dist/*.deb
            dist/*.sha256
          body: |
            Автоматическая сборка .deb из последнего push в `master`.
            Файл заменяется на каждом новом запуске workflow.
          fail_on_unmatched_files: true
          generate_release_notes: false
          overwrite_files: true
