name: Build DEB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    env:
      DEB_VERSION: 1.0.${{ github.run_number }}
      DEB_TAG: deb-v1.0.${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build .deb package
        run: |
          ./packaging/build-deb.sh
          ls -lah dist

      - name: Prepare release notes
        id: release_notes
        uses: actions/github-script@v7
        env:
          DEB_VERSION: ${{ env.DEB_VERSION }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const maxItems = 8;
            const refName = context.ref.replace("refs/heads/", "");

            let items = [];
            if (context.eventName === "push" && Array.isArray(context.payload.commits) && context.payload.commits.length > 0) {
              const commits = context.payload.commits.slice(-maxItems).reverse();
              items = commits.map((c) => {
                const id = (c.id || "").slice(0, 7);
                const msg = (c.message || "").split("\n")[0];
                const url = c.url || `https://github.com/${owner}/${repo}/commit/${c.id}`;
                return `- ${msg} ([${id}](${url}))`;
              });
            } else {
              const shortSha = context.sha.slice(0, 7);
              const url = `https://github.com/${owner}/${repo}/commit/${context.sha}`;
              items = [`- Manual run for commit [${shortSha}](${url})`];
            }

            const body = [
              "Автоматическая сборка .deb",
              "",
              `Версия пакета: \`${process.env.DEB_VERSION}\``,
              `Ветка: \`${refName}\``,
              `Коммит: [\`${context.sha.slice(0, 7)}\`](https://github.com/${owner}/${repo}/commit/${context.sha})`,
              "",
              "### Краткие изменения",
              ...items
            ].join("\n");

            core.setOutput("body", body);

      - name: Upload artifact
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapret-for-ubuntu-deb
          path: |
            dist/*.deb
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Keep only latest artifact
        uses: actions/github-script@v7
        env:
          CURRENT_ARTIFACT_ID: ${{ steps.upload_artifact.outputs.artifact-id }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const currentId = Number(process.env.CURRENT_ARTIFACT_ID || "0");
            const targetName = "zapret-for-ubuntu-deb";

            let page = 1;
            while (true) {
              const resp = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page
              });
              const artifacts = resp.data.artifacts || [];
              if (artifacts.length === 0) break;

              for (const artifact of artifacts) {
                if (artifact.name !== targetName) continue;
                if (artifact.id === currentId) continue;
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id
                });
                core.info(`Deleted old artifact ${artifact.id} (${artifact.name})`);
              }

              if (artifacts.length < 100) break;
              page += 1;
            }

      - name: Remove old deb assets from deb-latest release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = "deb-latest";
            let release;
            try {
              const resp = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = resp.data;
            } catch (error) {
              core.info("Release deb-latest not found yet. Skip cleanup.");
              return;
            }

            const assetPattern = /^zapret-for-ubuntu_.*\.deb(\.sha256)?$/;
            for (const asset of release.assets || []) {
              if (!assetPattern.test(asset.name)) continue;
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id
              });
              core.info(`Deleted old release asset ${asset.name}`);
            }

      - name: Publish/replace rolling release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deb-latest
          name: deb-latest
          prerelease: true
          make_latest: false
          files: |
            dist/*.deb
            dist/*.sha256
          body: ${{ steps.release_notes.outputs.body }}
          fail_on_unmatched_files: true
          generate_release_notes: false
          overwrite_files: true

      - name: Publish versioned deb release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DEB_TAG }}
          name: ${{ env.DEB_TAG }}
          prerelease: true
          make_latest: false
          files: |
            dist/*.deb
            dist/*.sha256
          body: ${{ steps.release_notes.outputs.body }}
          fail_on_unmatched_files: true
          generate_release_notes: false
          overwrite_files: true
